<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SANASAI 沙那賽</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #050510; height: 100%; }
  #hud {
    position: fixed; top: 12px; left: 14px; z-index: 10;
    color: #7ff7ff; font-family: "Courier New", monospace;
    text-shadow: 0 0 8px #00e5ff; pointer-events: none; user-select: none;
  }
  #hud h1 { margin: 0 0 4px 0; font-size: 20px; letter-spacing: 4px; }
  #hud p { margin: 0; font-size: 12px; opacity: .8; }
  #keys {
    position: fixed; top: 12px; right: 14px; z-index: 10;
    font-family: "Courier New", monospace; font-size: 15px;
    pointer-events: none; user-select: none; text-align: right;
  }
  #keys span { margin-left: 10px; opacity: .25; }
  #keys span.owned { opacity: 1; }
  #keys .copper.owned { color: #e09a5a; text-shadow: 0 0 8px #b87333; }
  #keys .jade.owned   { color: #4be8a8; text-shadow: 0 0 8px #00a86b; }
  #keys .crystal.owned{ color: #c9f6ff; text-shadow: 0 0 8px #a5f2f3; }
  #keys span:not(.owned) { color: #8899aa; }
  #prompt {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    z-index: 10; color: #ffe97f; font-family: "Courier New", monospace;
    font-size: 15px; text-shadow: 0 0 10px #ffb300; text-align: center;
    background: rgba(10,10,30,.65); border: 1px solid #ffe97f66;
    padding: 8px 18px; border-radius: 8px; display: none;
    pointer-events: none; user-select: none; line-height: 1.6;
  }
  #banner {
    position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
    z-index: 15; color: #fff; font-family: "Courier New", monospace;
    font-size: 30px; letter-spacing: 3px; text-shadow: 0 0 18px #ffe97f;
    opacity: 0; transition: opacity .5s; pointer-events: none; user-select: none;
    white-space: nowrap;
  }
  #splash {
    position: fixed; inset: 0; z-index: 40; overflow: hidden; cursor: pointer;
    background: linear-gradient(#0d1b33 0%, #0a1628 55%, #071120 100%);
    transition: opacity 1.2s;
  }
  #splash .seigaiha {
    position: absolute; inset: 0 0 42% 0; opacity: .45;
    background-image:
      radial-gradient(circle at 50% 135%, rgba(232,227,208,.12) 20%, transparent 21.5%),
      radial-gradient(circle at 50% 135%, rgba(232,227,208,.12) 33%, transparent 34.5%),
      radial-gradient(circle at 50% 135%, rgba(232,227,208,.12) 46%, transparent 47.5%),
      radial-gradient(circle at 50% 135%, rgba(232,227,208,.10) 20%, transparent 21.5%),
      radial-gradient(circle at 50% 135%, rgba(232,227,208,.10) 33%, transparent 34.5%),
      radial-gradient(circle at 50% 135%, rgba(232,227,208,.10) 46%, transparent 47.5%);
    background-size: 96px 48px;
    background-position: 0 0, 0 0, 0 0, 48px 24px, 48px 24px, 48px 24px;
  }
  #splash .moon {
    position: absolute; top: 11%; left: 16%; width: 124px; height: 124px; border-radius: 50%;
    background: radial-gradient(circle at 42% 40%, #f2efe2, #d9d4bd);
    box-shadow: 0 0 60px 18px rgba(233,230,216,.22);
  }
  #splash svg.wave { position: absolute; left: 0; will-change: transform; }
  #splash .w1 { bottom: 118px; opacity: .85; animation: drift 46s linear infinite; }
  #splash .w2 { bottom: 54px;  animation: drift 28s linear infinite; }
  #splash .w3 { bottom: 0;     animation: drift 18s linear infinite; }
  @keyframes drift { to { transform: translateX(-400px); } }
  #splash .boat {
    position: absolute; bottom: 178px; left: 26%; width: 96px;
    animation: bob 3.6s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-9px) rotate(2.5deg); }
  }
  #splash .title {
    position: absolute; top: 24%; left: 50%; transform: translateX(-50%);
    text-align: center; color: #e8e3d0;
    font-family: "Futura", "Avenir Next", "Helvetica Neue", sans-serif;
    text-shadow: 0 0 24px rgba(5, 12, 25, .8); white-space: nowrap;
  }
  #splash .title > * { opacity: 0; animation: rise 1.6s ease forwards; }
  #splash .t-main {
    font-size: clamp(30px, 7vw, 68px); font-weight: 500;
    letter-spacing: .5em; padding-left: .5em; animation-delay: .2s;
  }
  #splash .t-rule {
    width: 64px; height: 1px; background: rgba(232,227,208,.55);
    margin: 18px auto 14px; animation-delay: .7s;
  }
  #splash .t-sub {
    font-size: clamp(11px, 1.8vw, 16px); font-weight: 400;
    letter-spacing: .62em; padding-left: .62em; opacity: .8; animation-delay: .9s;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  #splash .hint {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2;
    color: rgba(232,227,208,.7);
    font-family: "Futura", "Avenir Next", "Helvetica Neue", sans-serif;
    font-size: 12px; letter-spacing: .5em; padding-left: .5em; white-space: nowrap;
    animation: blink 2.6s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: .25; } 50% { opacity: .85; } }
  @media (max-width: 600px) {
    #splash .moon { width: 84px; height: 84px; top: 7%; left: 10%; }
    #splash .title { top: 28%; }
  }
  #ending {
    position: fixed; inset: 0; z-index: 30; background: rgba(2,3,10,.94);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #ffe97f; font-family: "Courier New", monospace; text-align: center;
  }
  #ending h2 { font-size: 30px; letter-spacing: 4px; text-shadow: 0 0 16px #ffb300; margin: 0 0 14px; }
  #ending p { color: #9fdcff; font-size: 15px; margin: 6px 0; }
  #ending .coin { font-size: 46px; margin: 18px 0; filter: drop-shadow(0 0 12px #ffd23f); }
  #ending button {
    margin-top: 22px; background: none; border: 1px solid #ffe97f; color: #ffe97f;
    font-family: inherit; font-size: 15px; padding: 8px 22px; border-radius: 6px; cursor: pointer;
  }
  #overlay {
    position: fixed; inset: 0; z-index: 20; background: #000;
    display: none; flex-direction: column;
  }
  #overlay-bar {
    height: 44px; display: flex; align-items: center; gap: 12px;
    background: #0a0a20; color: #7ff7ff; font-family: "Courier New", monospace;
    padding: 0 12px; border-bottom: 1px solid #00e5ff44; flex: 0 0 auto;
  }
  #overlay-bar button {
    background: none; border: 1px solid #7ff7ff; color: #7ff7ff;
    font-family: inherit; font-size: 14px; padding: 6px 14px;
    border-radius: 6px; cursor: pointer;
  }
  #overlay-bar button:active { background: #7ff7ff33; }
  #overlay iframe { flex: 1 1 auto; border: 0; width: 100%; }
  #joystick {
    position: fixed; left: 24px; bottom: 24px; z-index: 10;
    width: 110px; height: 110px; border-radius: 50%;
    border: 2px solid #00e5ff55; background: rgba(0,229,255,.06);
    touch-action: none; display: none;
  }
  #stick {
    position: absolute; left: 35px; top: 35px; width: 40px; height: 40px;
    border-radius: 50%; background: rgba(0,229,255,.35);
    box-shadow: 0 0 12px #00e5ff88;
  }
  @media (pointer: coarse) { #joystick { display: block; } }
</style>
</head>

      <path d="M0 112 C30 98 58 82 92 84 C118 86 132 100 148 97 C136 84 140 64 158 56 C182 46 206 54 211 72 C215 87 204 98 190 100 C212 106 240 100 264 94 C300 85 350 100 400 112" fill="none" stroke="rgba(217,211,189,.5)" stroke-width="3" stroke-linecap="round"/>

      <path d="M0 78 C50 52 84 40 122 52 C152 62 168 84 196 82 C182 66 188 44 212 36 C242 26 272 36 277 58 C280 74 268 86 252 88 C282 96 322 76 352 66 C372 60 388 64 400 68" fill="none" stroke="rgba(239,233,214,.55)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="232" cy="32" r="3.5" fill="rgba(239,233,214,.6)"/>

<script type="module">
import * as THREE from 'three';

/* ---------- 遊戲清單：新遊戲上架只要加一行 ---------- */
const GAMES = [
  { name: '小蜜蜂',    en: 'BEE',        url: 'https://garychiang23-creator.github.io/bee/mobile.html', color: 0xffd23f },
  { name: 'Blocks Pro', en: 'BLOCKS PRO', url: 'https://garychiang23-creator.github.io/blocks/',        color: 0x4fc3f7 },
];

/* 學堂：不是遊戲，是世界裡的學習場所（綠洲裡本來就有學校） */
const SCHOOL = { name: '托福特訓', en: 'TOEFL GYM', url: 'https://garychiang23-creator.github.io/toefl/' };

/* ---------- 三把鑰匙（同網域 localStorage 讀真實紀錄） ---------- */
const BEE_TARGET = 20000;       // 銅：小蜜蜂最高分
const MARATHON_TARGET = 15000;  // 玉：Blocks MARATHON 分數（或完成 SPRINT 40）
const beeHi = () => parseInt(localStorage.getItem('bee_hi') || '0', 10);
const marathonBest = () => parseFloat(localStorage.getItem('tetris2_best_marathon') || '0');
const sprintDone = () => isFinite(parseFloat(localStorage.getItem('tetris2_best_sprint') || 'Infinity'));

const KEYS = [
  { id: 'copper',  name: '銅鑰匙', color: 0xb87333, glow: 0xe09a5a,
    met: () => beeHi() >= BEE_TARGET,
    quest: () => `銅鑰匙任務：小蜜蜂最高分 ${BEE_TARGET.toLocaleString()}（目前 ${beeHi().toLocaleString()}）`,
    pos: [-4.2, -6.2] },
  { id: 'jade',    name: '玉鑰匙', color: 0x00a86b, glow: 0x4be8a8,
    met: () => marathonBest() >= MARATHON_TARGET || sprintDone(),
    quest: () => `玉鑰匙任務：MARATHON ${MARATHON_TARGET.toLocaleString()} 分或完成 SPRINT 40（目前 ${Math.floor(marathonBest()).toLocaleString()}）`,
    pos: [4.2, -6.2] },
  { id: 'crystal', name: '水晶鑰匙', color: 0xa5f2f3, glow: 0xc9f6ff,
    met: () => true,   // 藏在暗處，走到就算
    quest: () => '',
    pos: [0, 17.5] },
];
let keyState = { copper: false, jade: false, crystal: false, coin: false };
try { Object.assign(keyState, JSON.parse(localStorage.getItem('sanasai_keys') || '{}')); } catch (e) {}
const saveKeys = () => { try { localStorage.setItem('sanasai_keys', JSON.stringify(keyState)); } catch (e) {} };
const allKeys = () => keyState.copper && keyState.jade && keyState.crystal;

/* ---------- 場景 ---------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);
scene.fog = new THREE.Fog(0x050510, 18, 55);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x8888aa, .6));
const moon = new THREE.DirectionalLight(0xaaccff, .5);
moon.position.set(5, 12, 6);
scene.add(moon);

const grid = new THREE.GridHelper(160, 80, 0x00e5ff, 0x123a55);
scene.add(grid);
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(160, 160),
  new THREE.MeshBasicMaterial({ color: 0x070718 })
);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.02;
scene.add(floor);

{
  const n = 900, pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const r = 70 + Math.random() * 60;
    const a = Math.random() * Math.PI * 2, b = Math.acos(Math.random() * 2 - 1);
    pos[i*3]   = r * Math.sin(b) * Math.cos(a);
    pos[i*3+1] = Math.abs(r * Math.cos(b)) + 2;
    pos[i*3+2] = r * Math.sin(b) * Math.sin(a);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xbfe8ff, size: .35 })));
}

/* ---------- 玩家分身 ---------- */
const avatar = new THREE.Group();
const body = new THREE.Mesh(
  new THREE.CapsuleGeometry(.35, .7, 6, 14),
  new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x0090aa, roughness: .3 })
);
body.position.y = .9;
avatar.add(body);
const halo = new THREE.Mesh(
  new THREE.TorusGeometry(.55, .04, 10, 40),
  new THREE.MeshBasicMaterial({ color: 0x00e5ff })
);
halo.rotation.x = Math.PI / 2;
halo.position.y = .08;
avatar.add(halo);
scene.add(avatar);

/* ---------- 街機機台 ---------- */
function labelTexture(text, sub, colorHex) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const x = c.getContext('2d');
  x.fillStyle = '#050a18'; x.fillRect(0, 0, 256, 256);
  const col = '#' + colorHex.toString(16).padStart(6, '0');
  x.strokeStyle = col; x.lineWidth = 8; x.strokeRect(8, 8, 240, 240);
  x.fillStyle = col; x.textAlign = 'center';
  x.font = 'bold 52px "PingFang TC", sans-serif';
  x.fillText(text, 128, 118);
  x.font = 'bold 26px "Courier New", monospace';
  x.fillText(sub, 128, 170);
  x.font = '20px sans-serif';
  x.fillText('▶ PLAY', 128, 215);
  return new THREE.CanvasTexture(c);
}

const cabinets = [];
GAMES.forEach((game, i) => {
  const angle = (i - (GAMES.length - 1) / 2) * (Math.PI / 5);
  const R = 9;
  const gx = Math.sin(angle) * R, gz = -Math.cos(angle) * R;

  const cab = new THREE.Group();
  const shell = new THREE.Mesh(
    new THREE.BoxGeometry(1.6, 2.3, 1.0),
    new THREE.MeshStandardMaterial({ color: 0x101028, roughness: .6 })
  );
  shell.position.y = 1.15;
  cab.add(shell);

  const screen = new THREE.Mesh(
    new THREE.PlaneGeometry(1.3, 1.3),
    new THREE.MeshBasicMaterial({ map: labelTexture(game.name, game.en, game.color) })
  );
  screen.position.set(0, 1.35, 0.51);
  cab.add(screen);

  const marquee = new THREE.Mesh(
    new THREE.BoxGeometry(1.7, .3, 1.05),
    new THREE.MeshBasicMaterial({ color: game.color })
  );
  marquee.position.y = 2.45;
  cab.add(marquee);

  const glow = new THREE.PointLight(game.color, 6, 7);
  glow.position.set(0, 1.6, 1.2);
  cab.add(glow);

  cab.position.set(gx, 0, gz);
  cab.lookAt(0, 0, 0);
  scene.add(cab);
  cabinets.push({ game, group: cab, screen, shell });
});

/* ---------- 學堂（暖光小屋，與霓虹街機區對比） ---------- */
const school = new THREE.Group();
{
  const walls = new THREE.Mesh(
    new THREE.BoxGeometry(2.6, 1.9, 2.2),
    new THREE.MeshStandardMaterial({ color: 0x4a3222, roughness: .8 })
  );
  walls.position.y = .95;
  school.add(walls);

  const roof = new THREE.Mesh(
    new THREE.ConeGeometry(2.3, 1.3, 4),
    new THREE.MeshStandardMaterial({ color: 0x8b3a2e, roughness: .7 })
  );
  roof.rotation.y = Math.PI / 4;
  roof.position.y = 2.55;
  school.add(roof);

  const door = new THREE.Mesh(
    new THREE.PlaneGeometry(.7, 1.2),
    new THREE.MeshBasicMaterial({ color: 0xffc87f })
  );
  door.position.set(0, .62, 1.11);
  school.add(door);

  const signCanvas = document.createElement('canvas');
  signCanvas.width = 512; signCanvas.height = 160;
  const sx = signCanvas.getContext('2d');
  sx.fillStyle = '#2a1a10'; sx.fillRect(0, 0, 512, 160);
  sx.strokeStyle = '#ffc87f'; sx.lineWidth = 10; sx.strokeRect(10, 10, 492, 140);
  sx.fillStyle = '#ffc87f'; sx.textAlign = 'center';
  sx.font = 'bold 78px "PingFang TC", sans-serif';
  sx.fillText('學 堂', 256, 88);
  sx.font = 'bold 30px "Courier New", monospace';
  sx.fillText('TOEFL GYM', 256, 134);
  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(1.7, .53),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(signCanvas) })
  );
  sign.position.set(0, 1.72, 1.12);
  school.add(sign);

  const lantern = new THREE.Mesh(
    new THREE.SphereGeometry(.16, 12, 10),
    new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff8822, emissiveIntensity: .9 })
  );
  lantern.position.set(1.15, 1.95, 1.2);
  school.add(lantern);

  const warm = new THREE.PointLight(0xffb066, 6, 10);
  warm.position.set(0, 1.8, 1.8);
  school.add(warm);

  school.position.set(-13, 0, -1);
  school.lookAt(0, 0, 0);
  scene.add(school);
}

/* ---------- 鑰匙基座與鑰匙 ---------- */
function makeKeyMesh(k) {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: k.color, emissive: k.color, emissiveIntensity: .55, roughness: .3, metalness: .6 });
  const ring = new THREE.Mesh(new THREE.TorusGeometry(.22, .06, 10, 24), mat);
  ring.position.y = .3;
  g.add(ring);
  const shaft = new THREE.Mesh(new THREE.BoxGeometry(.1, .55, .1), mat);
  shaft.position.y = -.15;
  g.add(shaft);
  const t1 = new THREE.Mesh(new THREE.BoxGeometry(.18, .09, .09), mat);
  t1.position.set(.12, -.38, 0);
  g.add(t1);
  const t2 = new THREE.Mesh(new THREE.BoxGeometry(.13, .09, .09), mat);
  t2.position.set(.1, -.24, 0);
  g.add(t2);
  return g;
}

const pedestals = {};   // id -> { group, key, k }
function spawnPedestal(k) {
  if (pedestals[k.id]) return;
  const group = new THREE.Group();
  const base = new THREE.Mesh(
    new THREE.CylinderGeometry(.5, .65, .9, 8),
    new THREE.MeshStandardMaterial({ color: 0x14142e, roughness: .5 })
  );
  base.position.y = .45;
  group.add(base);
  const key = makeKeyMesh(k);
  key.position.y = 1.5;
  group.add(key);
  const light = new THREE.PointLight(k.glow, 7, 6);
  light.position.y = 1.6;
  group.add(light);
  group.position.set(k.pos[0], 0, k.pos[1]);
  scene.add(group);
  pedestals[k.id] = { group, key, k };
}
function removePedestal(id) {
  if (!pedestals[id]) return;
  scene.remove(pedestals[id].group);
  delete pedestals[id];
}

/* 石碑（水晶鑰匙的提示） */
const stele = new THREE.Mesh(
  new THREE.BoxGeometry(.7, 1.5, .25),
  new THREE.MeshStandardMaterial({ color: 0x1a2a3a, emissive: 0x0a2a3a, emissiveIntensity: .4, roughness: .7 })
);
stele.position.set(2.6, .75, 1.8);
stele.rotation.y = -.5;
scene.add(stele);

/* 沙那賽之門（集齊三鑰匙才出現） */
let gate = null;
function spawnGate() {
  if (gate) return;
  gate = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xffe97f, emissive: 0xffb300, emissiveIntensity: .6, roughness: .4 });
  const l = new THREE.Mesh(new THREE.BoxGeometry(.4, 4, .4), mat); l.position.set(-1.5, 2, 0); gate.add(l);
  const r = new THREE.Mesh(new THREE.BoxGeometry(.4, 4, .4), mat); r.position.set(1.5, 2, 0); gate.add(r);
  const top = new THREE.Mesh(new THREE.BoxGeometry(3.8, .4, .5), mat); top.position.set(0, 4.1, 0); gate.add(top);
  const light = new THREE.PointLight(0xffe97f, 10, 12); light.position.set(0, 2.5, 1); gate.add(light);
  gate.position.set(0, 0, -13);
  scene.add(gate);
  banner('三鑰齊聚——沙那賽之門開啟');
}

/* 25¢ 復活幣（結局後常駐入口） */
let coin = null;
function spawnCoin() {
  if (coin) return;
  coin = new THREE.Mesh(
    new THREE.CylinderGeometry(.35, .35, .07, 24),
    new THREE.MeshStandardMaterial({ color: 0xffd23f, emissive: 0xaa7700, emissiveIntensity: .5, metalness: .8, roughness: .25 })
  );
  coin.rotation.x = Math.PI / 2;
  coin.position.set(-2.4, 1.1, 2.2);
  scene.add(coin);
}
if (keyState.coin) spawnCoin();

/* ---------- 鑰匙狀態機 ---------- */
function checkKeys() {
  for (const k of KEYS) {
    if (keyState[k.id]) { removePedestal(k.id); continue; }
    if (k.met()) spawnPedestal(k);
  }
  for (const k of KEYS) {
    const el = document.getElementById('key-' + k.id);
    el.classList.toggle('owned', !!keyState[k.id]);
  }
  if (allKeys() && !keyState.coin) spawnGate();
}
setInterval(checkKeys, 4000);

const bannerEl = document.getElementById('banner');
let bannerTimer = null;
function banner(text) {
  bannerEl.textContent = text;
  bannerEl.style.opacity = '1';
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => { bannerEl.style.opacity = '0'; }, 2600);
}

function collectKey(k) {
  keyState[k.id] = true;
  saveKeys();
  removePedestal(k.id);
  banner(`⚿ ${k.name}到手！`);
  checkKeys();
}

/* ---------- 輸入 ---------- */
const keys = {};
addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Enter' && !uiLock()) {
    if (nearCabinet) enterGame(nearCabinet.game);
    else if (nearSchool) enterGame(SCHOOL);
  }
  if (e.key === 'Escape') closeGame();
  if (DEBUG) {
    if (e.key === '7') { localStorage.setItem('bee_hi', String(BEE_TARGET + 500)); banner('DEBUG：偽造小蜜蜂紀錄'); checkKeys(); }
    if (e.key === '8') { localStorage.setItem('tetris2_best_marathon', String(MARATHON_TARGET + 500)); banner('DEBUG：偽造 Blocks 紀錄'); checkKeys(); }
    if (e.key === '9') { avatar.position.set(0, 0, 14); banner('DEBUG：傳送到暗處附近'); }
  }
});
addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

/* 觸控搖桿 */
const joy = { x: 0, y: 0 };
{
  const pad = document.getElementById('joystick');
  const stick = document.getElementById('stick');
  let active = null;
  pad.addEventListener('pointerdown', e => { active = e.pointerId; pad.setPointerCapture(e.pointerId); move(e); });
  pad.addEventListener('pointermove', e => { if (e.pointerId === active) move(e); });
  const end = e => {
    if (e.pointerId !== active) return;
    active = null; joy.x = 0; joy.y = 0;
    stick.style.left = '35px'; stick.style.top = '35px';
  };
  pad.addEventListener('pointerup', end);
  pad.addEventListener('pointercancel', end);
  function move(e) {
    const r = pad.getBoundingClientRect();
    let dx = e.clientX - (r.left + 55), dy = e.clientY - (r.top + 55);
    const len = Math.hypot(dx, dy), max = 38;
    if (len > max) { dx = dx / len * max; dy = dy / len * max; }
    joy.x = dx / max; joy.y = dy / max;
    stick.style.left = 35 + dx + 'px';
    stick.style.top = 35 + dy + 'px';
  }
}

/* 點擊機台 */
const ray = new THREE.Raycaster(), pointer = new THREE.Vector2();
renderer.domElement.addEventListener('pointerup', e => {
  if (uiLock()) return;
  pointer.set(e.clientX / innerWidth * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  ray.setFromCamera(pointer, camera);
  for (const c of cabinets) {
    if (ray.intersectObjects([c.screen, c.shell]).length) { enterGame(c.game); return; }
  }
  if (ray.intersectObjects(school.children).length) enterGame(SCHOOL);
});

/* ---------- 進出遊戲／結局 ---------- */
const overlay = document.getElementById('overlay');
const frame = document.getElementById('game-frame');
const ending = document.getElementById('ending');
let inGame = false, inEnding = false;
const uiLock = () => inGame || inEnding;

function enterGame(game) {
  if (uiLock()) return;
  inGame = true;
  document.getElementById('overlay-title').textContent = `${game.name}  ${game.en}`;
  frame.src = game.url;
  overlay.style.display = 'flex';
}
function closeGame() {
  if (!inGame) return;
  inGame = false;
  overlay.style.display = 'none';
  frame.src = 'about:blank';
  checkKeys();   // 回大廳立刻對帳：有沒有新鑰匙現世
}
document.getElementById('btn-back').addEventListener('click', closeGame);

function openEnding() {
  inEnding = true;
  keyState.coin = true;
  saveKeys();
  spawnCoin();
  ending.style.display = 'flex';
}
document.getElementById('btn-ending').addEventListener('click', () => {
  inEnding = false;
  ending.style.display = 'none';
});

/* ---------- DEBUG（僅本機測試；線上一律關閉） ---------- */
const DEBUG = (location.protocol === 'file:' || location.hostname === 'localhost')
  && new URLSearchParams(location.search).get('debug') === '1';
if (DEBUG) document.querySelector('#hud p').textContent = 'DEBUG：7=偽造小蜜蜂 8=偽造Blocks 9=傳送暗處';

/* ---------- 開場：渡海（點擊即登島，否則 5 秒後自動） ---------- */
const splash = document.getElementById('splash');
const hideSplash = () => {
  splash.style.opacity = '0';
  splash.style.pointerEvents = 'none';
  setTimeout(() => { splash.style.display = 'none'; }, 1300);
};
setTimeout(hideSplash, 5200);
splash.addEventListener('pointerdown', hideSplash, { once: true });

/* ---------- 主迴圈 ---------- */
const promptEl = document.getElementById('prompt');
let nearCabinet = null, nearSchool = false;
const vel = new THREE.Vector3();
const clock = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;

  if (!uiLock()) {
    let ix = (keys['d'] || keys['arrowright'] ? 1 : 0) - (keys['a'] || keys['arrowleft'] ? 1 : 0) + joy.x;
    let iz = (keys['s'] || keys['arrowdown'] ? 1 : 0) - (keys['w'] || keys['arrowup'] ? 1 : 0) + joy.y;
    const len = Math.hypot(ix, iz);
    if (len > 1) { ix /= len; iz /= len; }
    vel.set(ix, 0, iz).multiplyScalar(6);
    avatar.position.addScaledVector(vel, dt);
    avatar.position.x = THREE.MathUtils.clamp(avatar.position.x, -20, 20);
    avatar.position.z = THREE.MathUtils.clamp(avatar.position.z, -20, 20);
    if (len > .1) {
      const target = Math.atan2(ix, iz);
      let d = target - avatar.rotation.y;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      avatar.rotation.y += d * Math.min(1, dt * 10);
    }
  }

  halo.rotation.z += dt * 2;
  body.position.y = .9 + Math.sin(t * 2) * .04;
  for (const id in pedestals) {
    const p = pedestals[id];
    p.key.rotation.y += dt * 1.5;
    p.key.position.y = 1.5 + Math.sin(t * 2.2) * .12;
  }
  if (coin) coin.rotation.z += dt * 2;

  /* 接近偵測：機台與學堂 */
  nearCabinet = null;
  let best = 3.2;
  for (const c of cabinets) {
    const d = avatar.position.distanceTo(c.group.position);
    if (d < best) { best = d; nearCabinet = c; }
  }
  nearSchool = avatar.position.distanceTo(school.position) < 3.6;

  /* 接近偵測：鑰匙拾取 */
  for (const id in pedestals) {
    const p = pedestals[id];
    if (avatar.position.distanceTo(p.group.position) < 1.4) collectKey(p.k);
  }

  /* 接近偵測：門 */
  if (gate && !keyState.coin && !inEnding && avatar.position.distanceTo(gate.position) < 2.2) openEnding();

  /* 提示文字 */
  const lines = [];
  if (nearCabinet && !uiLock()) {
    lines.push(`按 Enter 進入《${nearCabinet.game.name}》`);
    const k = KEYS.find(k =>
      (k.id === 'copper' && nearCabinet.game.en === 'BEE') ||
      (k.id === 'jade' && nearCabinet.game.en === 'BLOCKS PRO'));
    if (k && !keyState[k.id]) lines.push(k.met() ? `⚿ ${k.name}已現世——就在機台旁的基座上` : k.quest());
  }
  if (nearSchool && !nearCabinet && !uiLock()) {
    lines.push('按 Enter 進入學堂《托福特訓》');
  }
  if (avatar.position.distanceTo(stele.position) < 2.2) {
    lines.push('石碑：「霓虹照不到的暗處，沉著第三把鑰匙。」');
  }
  if (gate && !keyState.coin && allKeys()) {
    lines.push('沙那賽之門在霓虹深處發光……');
  }
  if (lines.length) {
    promptEl.innerHTML = lines.join('<br>');
    promptEl.style.display = 'block';
  } else {
    promptEl.style.display = 'none';
  }

  /* 攝影機跟隨 */
  const camTarget = new THREE.Vector3(avatar.position.x, 4.5, avatar.position.z + 8.5);
  camera.position.lerp(camTarget, Math.min(1, dt * 4));
  camera.lookAt(avatar.position.x, 1.2, avatar.position.z);

  renderer.render(scene, camera);
}
checkKeys();
tick();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
